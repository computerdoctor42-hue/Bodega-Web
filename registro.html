<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Clientes - Taribela</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        nav { background: #2563eb; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 20px; }
        nav .logo { color: white; font-weight: bold; font-size: 1.2rem; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; }
        nav ul li a:hover { text-decoration: underline; }
        
        .container { display: flex; justify-content: center; width: 100%; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2563eb; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #2563eb; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #94a3b8; }
    </style>
</head>
<body>

<nav>
    <div class="logo">TARIBELA LUBRICADORA</div>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="registro.html">Registro</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2>Registro Nuevo Cliente</h2>
        <input type="text" id="Name" placeholder="Nombre Completo" required>
        <input type="text" id="IdNumber" placeholder="Cédula / RUC" required>
        <input type="text" id="Tradename" placeholder="Nombre Comercial (Opcional)">
        <input type="text" id="Address" placeholder="Dirección">
        <input type="text" id="Telefono" placeholder="Teléfono">
        <input type="email" id="Email" placeholder="Correo Electrónico">
        
        <input type="password" id="ClaveWeb" placeholder="Cree su Contraseña Web" required>
        
        <button id="btnEnviar">REGISTRARME</button>
    </div>
</div>

<script>
    const VAL_URL = "https://gdyqwciwesxeqjbjlsxc.supabase.co";
    const VAL_KEY = "sb_publishable_hQfFuxcZVkFWOfLIwh_G5A_gGiP-rFP"; 

    const supabaseClient = supabase.createClient(VAL_URL, VAL_KEY);

    document.getElementById('btnEnviar').onclick = async function() {
        const btn = this;
        
        const nameVal = document.getElementById('Name').value.trim();
        const idVal = document.getElementById('IdNumber').value.trim();
        const claveVal = document.getElementById('ClaveWeb').value.trim();
        
        // Validación de campos obligatorios
        if (nameVal.length === 0 || idVal.length === 0 || claveVal.length === 0) {
            alert("Por favor, complete los campos obligatorios: Nombre, Identificación y Contraseña.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        const datos = {
            Name: nameVal,
            IdNumber: idVal,
            Tradename: document.getElementById('Tradename').value.trim() || null,
            Address: document.getElementById('Address').value.trim() || null,
            Telefono: document.getElementById('Telefono').value.trim() || null,
            Email: document.getElementById('Email').value.trim() || null,
            Category: "A",
            isDeleted: "N",
            advertising: "S",
            Salesperson: "1",
            is_downloaded: false,
            
            // SEGURO: Se envía la clave que el cliente digitó en el formulario
            clave_web: claveVal
        };

        try {
            const { error } = await supabaseClient.from('ArCustomer').insert([datos]);
            if (error) throw error;
            
            alert("¡Registro exitoso! Ya puedes iniciar sesión con tus datos.");
            window.location.href = "index.html";
        } catch (err) {
            alert("Error al registrarse: " + err.message);
            console.error(err);
            btn.disabled = false;
            btn.innerText = "REGISTRARME";
        }
    };
</script>

</body>
</html>
