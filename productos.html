<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo RealTime - EXPERTOS EN MANTENIMIENTO</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900">

    <nav class="bg-white py-4 px-6 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo_expertos_2912025-1.png" alt="Expertos en Mantenimiento" class="h-12 w-auto object-contain">
            </div>
            <ul class="flex space-x-6 text-gray-500 font-semibold text-sm uppercase tracking-wider">
                <li><a href="#" class="hover:text-blue-600 transition">Inicio</a></li>
                <li><a href="#" class="text-blue-600 font-bold">Productos</a></li>
                <li><a href="#" class="hover:text-blue-600 transition">Registro</a></li>
            </ul>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black text-gray-900 tracking-tight">Inventario de Bodega</h1>
                <p class="text-gray-500 font-medium mt-1">Sincronización directa desde C# / SQL Server</p>
            </div>
            <div id="status-badge" class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500 transition-all duration-500">
                <span class="w-2 h-2 mr-2 rounded-full bg-gray-400"></span>
                INICIALIZANDO...
            </div>
        </header>

        <div class="flex flex-col md:flex-row items-center gap-4 mb-6 w-full">
            <div class="relative flex-1 w-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="input-busqueda-1" oninput="filtrarYRenderizar()" placeholder="Filtro principal..." class="block w-full pl-11 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium text-gray-700 placeholder-gray-400 shadow-sm">
            </div>

            <div class="relative flex-1 w-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                    </svg>
                </div>
                <input type="text" id="input-busqueda-2" oninput="filtrarYRenderizar()" placeholder="Filtro secundario..." class="block w-full pl-11 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium text-gray-700 placeholder-gray-400 shadow-sm">
            </div>

            <label class="flex items-center space-x-2 cursor-pointer select-none shrink-0">
                <input type="checkbox" id="chk-mostrar-cero" onchange="filtrarYRenderizar()" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 transition-all">
                <span class="text-sm font-bold text-gray-700">Incluir productos con cero stock</span>
            </label>

            <div class="w-full md:w-auto shrink-0">
                <select id="select-vista" onchange="cambiarVista(this.value)" class="w-full md:w-64 bg-white border border-gray-200 text-gray-700 text-sm font-medium rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 p-2.5 shadow-sm cursor-pointer transition-all">
                    <option value="lista">Vista: Detalle (Lista)</option>
                    <option value="cuadricula">Vista: Cuadrícula (Bloques)</option>
                </select>
            </div>
        </div>

        <div class="bg-white shadow-sm rounded-2xl overflow-hidden border border-gray-200 mb-6">
            
            <div id="vista-lista-contenedor" class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white border-b border-gray-100">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Imagen</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Código</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Descripción</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Stock</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider text-right">Precio Final (+IVA)</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos" class="divide-y divide-gray-50">
                        <tr>
                            <td colspan="5" class="p-20 text-center">
                                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-200 border-t-blue-600 mb-4"></div>
                                <p class="text-gray-400 font-medium text-sm">Descargando catálogo completo en vivo...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="vista-cuadricula-contenedor" class="hidden p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 bg-white">
                </div>

            <div class="bg-white border-t border-gray-100 px-6 py-4 flex items-center justify-between">
                <div class="text-sm font-medium text-gray-500" id="info-paginacion">
                    Mostrando 0 a 0 de 0 productos
                </div>
                <div class="inline-flex space-x-2">
                    <button id="btn-prev" onclick="cambiarPagina(-1)" class="px-4 py-2 text-sm font-semibold bg-white border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">Anterior</button>
                    <button id="btn-next" onclick="cambiarPagina(1)" class="px-4 py-2 text-sm font-semibold bg-white border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">Siguiente</button>
                </div>
            </div>
        </div>

        <footer class="mt-12 pb-10 text-center">
            <p class="text-gray-400 text-sm font-medium uppercase tracking-widest">&copy; 2026 TROYABANANA • Taribela Lubricadora</p>
        </footer>
    </div>

    <div id="popup-imagen" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4" onclick="cerrarPopup()">
        <div class="bg-white rounded-2xl overflow-hidden shadow-2xl p-4 flex flex-col items-center" style="width: 650px;" onclick="event.stopPropagation()">
            <div class="w-full flex justify-between items-center mb-2">
                <h3 id="popup-titulo" class="text-sm font-bold text-gray-900 truncate pr-4"></h3>
                <button onclick="cerrarPopup()" class="text-gray-400 hover:text-gray-700 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div class="bg-gray-50 rounded-xl overflow-hidden flex items-center justify-center border border-gray-100" style="width: 600px; height: 600px;">
                <img id="popup-img-tag" src="" alt="Producto Ampliado" class="w-full h-full object-contain">
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://gdyqwciwesxeqjbjlsxc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hQfFuxcZVkFWOfLIwh_G5A_gGiP-rFP";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const URL_STORAGE = `${SUPABASE_URL}/storage/v1/object/public/productos-imagenes/`;

        let todosLosProductos = [];
        let productosFiltrados = [];
        let paginaActual = 1;
        const registrosPorPagina = 100;
        let vistaActual = "lista"; 

        function cambiarVista(nuevaVista) {
            vistaActual = nuevaVista;
            const contenedorLista = document.getElementById('vista-lista-contenedor');
            const contenedorCuadricula = document.getElementById('vista-cuadricula-contenedor');

            if (vistaActual === "lista") {
                contenedorLista.classList.remove('hidden');
                contenedorCuadricula.classList.add('hidden');
            } else {
                contenedorLista.classList.add('hidden');
                contenedorCuadricula.classList.remove('hidden');
            }
            renderizarTabla();
        }

        function renderizarTabla() {
            const tabla = document.getElementById('tabla-productos');
            const cuadricula = document.getElementById('vista-cuadricula-contenedor');
            
            const indiceInicio = (paginaActual - 1) * registrosPorPagina;
            const indiceFin = indiceInicio + registrosPorPagina;
            const registrosPagina = productosFiltrados.slice(indiceInicio, indiceFin);

            const total = productosFiltrados.length;
            const mostrandoHasta = Math.min(indiceFin, total);
            const mostrandoDesde = total === 0 ? 0 : indiceInicio + 1;
            
            document.getElementById('info-paginacion').innerText = `Mostrando ${mostrandoDesde} a ${mostrandoHasta} de ${total} productos`;
            document.getElementById('btn-prev').disabled = (paginaActual === 1);
            document.getElementById('btn-next').disabled = (indiceFin >= total);

            if (registrosPagina.length === 0) {
                tabla.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-400 italic">No se encontraron productos.</td></tr>';
                cuadricula.innerHTML = `<div class="col-span-full p-20 text-center text-gray-400 italic">No se encontraron productos.</div>`;
                return;
            }

            let htmlListaCompleto = "";
            let htmlCuadriculaCompleto = "";

            registrosPagina.forEach(p => {
                const precioOriginal = parseFloat(p.Price) || 0; 
                const stockReal = parseInt(p.Stock) || 0;
                const precioIVA = (precioOriginal * 1.15).toFixed(2);
                
                // Estilos de Stock exactos por rangos
                let badgeStockClass = "bg-green-50 text-green-600 border border-green-200";
                if (stockReal <= 0) badgeStockClass = "bg-red-50 text-red-600 border border-red-200";
                else if (stockReal <= 5) badgeStockClass = "bg-yellow-50 text-yellow-600 border border-yellow-200";

                let stockColorTabla = "text-green-600";
                if (stockReal <= 0) stockColorTabla = "text-red-600";
                else if (stockReal <= 5) stockColorTabla = "text-yellow-500";

                let nombreFotoBase = (p.Foto || p.stock_code || "").toString().trim();
                nombreFotoBase = nombreFotoBase.replace(/\.[^/.]+$/, "");

                const urlBase = `${URL_STORAGE}${nombreFotoBase}`;
                const timestamp = `?t=${new Date().getTime()}`;
                const urlInicial = `${urlBase}.jpg${timestamp}`;

                // VISTA FILA (TABLA DETALLE)
                htmlListaCompleto += `
                    <tr class="hover:bg-gray-50/80 transition-all group">
                        <td class="p-4 w-20 text-center">
                            <div class="w-12 h-12 bg-white rounded-lg border border-gray-200 overflow-hidden flex items-center justify-center cursor-pointer shadow-sm hover:scale-105 transition-transform"
                                 onclick="abrirPopup(this.querySelector('img').src, '${p.descripcion || p.stock_code}')">
                                <img src="${urlInicial}" alt="Foto" class="w-full h-full object-contain"
                                     data-ext-index="0"
                                     data-base-url="${urlBase}"
                                     onerror="rotarExtensiones(this)">
                            </div>
                        </td>
                        <td class="p-4 font-mono text-xs text-blue-600 font-bold">${p.stock_code}</td>
                        <td class="p-4">
                            <div class="text-gray-900 font-bold text-sm uppercase">${p.descripcion || '---'}</div>
                        </td>
                        <td class="p-4 text-center font-black text-xl ${stockColorTabla}">${stockReal}</td>
                        <td class="p-4 text-right">
                            <span class="text-xs font-medium text-gray-400 mr-0.5">$</span>
                            <span class="text-xl font-black text-gray-900 tracking-tight">${precioIVA}</span>
                        </td>
                    </tr>
                `;

                // VISTA BLOQUE (DISEÑO CUADRÍCULA IDÉNTICO A IMAGE_796534 / IMAGE_796138)
                htmlCuadriculaCompleto += `
                    <div class="bg-white rounded-3xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition-all flex flex-col justify-between">
                        <div class="w-full h-48 bg-gray-50 rounded-2xl border border-gray-100 overflow-hidden flex items-center justify-center cursor-pointer mb-4"
                             onclick="abrirPopup(this.querySelector('img').src, '${p.descripcion || p.stock_code}')">
                            <img src="${urlInicial}" alt="Foto" class="max-h-full max-w-full object-contain p-2"
                                 data-ext-index="0"
                                 data-base-url="${urlBase}"
                                 onerror="rotarExtensiones(this)">
                        </div>
                        
                        <div class="flex flex-col flex-grow justify-between gap-2">
                            <div>
                                <div class="text-blue-600 font-bold text-xs mb-1">${p.stock_code}</div>
                                <div class="text-gray-900 font-bold text-sm uppercase line-clamp-2 min-h-[40px]">
                                    ${p.descripcion || '---'}
                                </div>
                            </div>
                            
                            <div class="flex items-center justify-between mt-4 pt-2">
                                <div class="text-xs font-bold px-2 py-1 rounded-lg ${badgeStockClass}">
                                    Stock: ${stockReal}
                                </div>
                                <div class="text-right">
                                    <span class="text-2xl font-black text-gray-900 tracking-tight">$${precioIVA}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            if (vistaActual === "lista") {
                tabla.innerHTML = htmlListaCompleto;
            } else {
                cuadricula.innerHTML = htmlCuadriculaCompleto;
            }
        }

        function rotarExtensiones(img) {
            const extensiones = [".JPG", ".jpeg", ".JPEG", ".png", ".PNG"];
            let currentIndex = parseInt(img.getAttribute('data-ext-index'));
            const baseUrl = img.getAttribute('data-base-url');
            const timestamp = `?t=${new Date().getTime()}`;

            if (currentIndex < extensiones.length) {
                const proximaExt = extensiones[currentIndex];
                img.setAttribute('data-ext-index', currentIndex + 1);
                img.src = `${baseUrl}${proximaExt}${timestamp}`;
            } else {
                img.onerror = null; 
                img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%23d1d5db'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='1' d='M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>";
            }
        }

        function abrirPopup(url, titulo) {
            document.getElementById('popup-titulo').innerText = titulo;
            document.getElementById('popup-img-tag').src = url;
            document.getElementById('popup-imagen').classList.remove('hidden');
        }

        function cerrarPopup() {
            document.getElementById('popup-imagen').classList.add('hidden');
            document.getElementById('popup-img-tag').src = "";
        }

        function filtrarYRenderizar() {
            const t1 = document.getElementById('input-busqueda-1').value.toLowerCase().trim();
            const t2 = document.getElementById('input-busqueda-2').value.toLowerCase().trim();
            const incluirStockCero = document.getElementById('chk-mostrar-cero').checked;
            
            let datosFiltradosFase = todosLosProductos;

            if (!incluirStockCero) {
                datosFiltradosFase = datosFiltradosFase.filter(p => (parseInt(p.Stock) || 0) > 0);
            }

            if (t1 !== "") {
                datosFiltradosFase = datosFiltradosFase.filter(p => 
                    (p.descripcion && p.descripcion.toLowerCase().includes(t1)) ||
                    (p.LongDescription && p.LongDescription.toLowerCase().includes(t1)) ||
                    (p.stock_code && p.stock_code.toLowerCase().includes(t1))
                );
            }
            
            if (t2 !== "") {
                productosFiltrados = datosFiltradosFase.filter(p => 
                    (p.descripcion && p.descripcion.toLowerCase().includes(t2)) ||
                    (p.LongDescription && p.LongDescription.toLowerCase().includes(t2)) ||
                    (p.stock_code && p.stock_code.toLowerCase().includes(t2))
                );
            } else {
                productosFiltrados = datosFiltradosFase;
            }
            
            paginaActual = 1; 
            renderizarTabla();
        }

        function cambiarPagina(direccion) {
            paginaActual += direccion;
            renderizarTabla();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function cargarProductosIniciales() {
            try {
                const limiteBloque = 1000;
                const promesas = [];
                
                for (let i = 0; i < 10; i++) {
                    const desde = i * limiteBloque;
                    const hasta = desde + limiteBloque - 1;
                    
                    promesas.push(
                        supabaseClient
                            .from('productos_web') 
                            .select('stock_code, descripcion, Price, Stock, LongDescription, Foto')
                            .range(desde, hasta)
                            .then(res => {
                                if (res.error) throw res.error;
                                return res.data || [];
                            })
                    );
                }

                const resultadosLotes = await Promise.all(promesas);
                let datosUnificados = resultadosLotes.flat().filter(p => p !== null && p.stock_code);

                datosUnificados.sort((a, b) => {
                    const descA = (a.descripcion || "").toLowerCase();
                    const descB = (b.descripcion || "").toLowerCase();
                    return descA.localeCompare(descB);
                });

                todosLosProductos = datosUnificados;

                const badge = document.getElementById('status-badge');
                badge.innerHTML = `<span class="w-2 h-2 mr-2 rounded-full bg-green-500 animate-pulse"></span> TRANSMISIÓN EN VIVO`;
                badge.className = "inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold bg-green-50 text-green-700 border border-green-200";

                filtrarYRenderizar();

            } catch (error) {
                console.error("Error:", error);
                const badge = document.getElementById('status-badge');
                badge.innerHTML = `<span class="w-2 h-2 mr-2 rounded-full bg-red-600"></span> DESCONECTADO`;
                badge.className = "inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold bg-red-50 text-red-700 border border-red-200";
            }
        }

        function activarEscuchaTiempoReal() {
            supabaseClient
                .channel('cambios-inventario')
                .on(
                    'postgres_changes', 
                    { event: '*', schema: 'public', table: 'productos_web' }, 
                    (payload) => {
                        cargarProductosIniciales();
                    }
                )
                .subscribe();
        }

        window.onload = function() {
            cargarProductosIniciales();
            activarEscuchaTiempoReal();
        };
    </script>
</body>
</html>
